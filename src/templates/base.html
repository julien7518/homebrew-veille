<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Veille Homebrew</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #f3f4f6;
                color: #1f2937;
                min-height: 100vh;
            }
            nav {
                background: #1f2937;
                color: white;
                padding: 16px 24px;
                display: flex;
                align-items: center;
                gap: 24px;
            }
            nav a {
                color: #9ca3af;
                text-decoration: none;
                font-size: 15px;
            }
            nav a:hover {
                color: white;
            }
            nav a.active {
                color: white;
                font-weight: 600;
            }
            nav .brand {
                font-weight: 700;
                font-size: 18px;
                color: white;
                margin-right: 8px;
            }
            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 24px;
            }
            .flash {
                padding: 12px 16px;
                border-radius: 8px;
                margin-bottom: 16px;
                font-size: 14px;
            }
            .flash.success {
                background: #d1fae5;
                color: #065f46;
                border: 1px solid #a7f3d0;
            }
            .flash.error {
                background: #fee2e2;
                color: #991b1b;
                border: 1px solid #fecaca;
            }
            .card {
                background: white;
                border-radius: 12px;
                padding: 24px;
                margin-bottom: 20px;
                border: 1px solid #e5e7eb;
            }
            .card h2 {
                font-size: 16px;
                color: #6b7280;
                margin-bottom: 8px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .card .value {
                font-size: 28px;
                font-weight: 700;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
            }
            th {
                text-align: left;
                padding: 10px 12px;
                background: #f9fafb;
                color: #6b7280;
                font-weight: 600;
                border-bottom: 2px solid #e5e7eb;
            }
            td {
                padding: 10px 12px;
                border-bottom: 1px solid #f3f4f6;
            }
            tr:hover td {
                background: #f9fafb;
            }
            .badge {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 9999px;
                font-size: 12px;
                font-weight: 600;
            }
            .badge.sent {
                background: #d1fae5;
                color: #065f46;
            }
            .badge.skip {
                background: #fef3c7;
                color: #92400e;
            }
            .badge.error {
                background: #fee2e2;
                color: #991b1b;
            }
            .btn {
                display: inline-block;
                padding: 10px 20px;
                background: #1f2937;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
            }
            .btn:hover {
                background: #374151;
            }
            .btn.danger {
                background: #dc2626;
            }
            .btn.danger:hover {
                background: #b91c1c;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }
            label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #374151;
                margin-bottom: 4px;
                margin-top: 12px;
            }
            input,
            select {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                font-size: 14px;
            }
            input:focus {
                outline: none;
                border-color: #1f2937;
                box-shadow: 0 0 0 3px rgba(31, 41, 55, 0.1);
            }
            .form-actions {
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <nav>
            <span class="brand">Veille Homebrew</span>
            <a
                href="{{ url_for('dashboard') }}"
                class="{% if request.endpoint == 'dashboard' %}active{% endif %}"
                >Dashboard</a
            >
            <a
                href="{{ url_for('logs_page') }}"
                class="{% if request.endpoint == 'logs_page' %}active{% endif %}"
                >Logs</a
            >
            <a
                href="{{ url_for('config_page') }}"
                class="{% if request.endpoint == 'config_page' %}active{% endif %}"
                >Configuration</a
            >
        </nav>
        <div class="container">
            {% with messages = get_flashed_messages(with_categories=true) %} {%
            for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %} {% endwith %} {% block content %}{% endblock %}
        </div>
    </body>
</html>
