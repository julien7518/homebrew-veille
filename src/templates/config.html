{% extends "base.html" %} {% block content %}
<div class="card">
    <h2>Configuration SMTP</h2>
    <form method="post">
        <label for="smtp_host">Serveur SMTP</label>
        <input
            type="text"
            id="smtp_host"
            name="smtp_host"
            value="{{ config.smtp_host }}"
            placeholder="smtp.example.com"
        />

        <label for="smtp_port">Port</label>
        <input
            type="number"
            id="smtp_port"
            name="smtp_port"
            value="{{ config.smtp_port or '587' }}"
            placeholder="587"
        />

        <label for="smtp_user">Utilisateur</label>
        <input
            type="text"
            id="smtp_user"
            name="smtp_user"
            value="{{ config.smtp_user }}"
            placeholder="user@example.com"
        />

        <label for="smtp_password">Mot de passe</label>
        <input
            type="password"
            id="smtp_password"
            name="smtp_password"
            value="{{ config.smtp_password }}"
            placeholder="••••••••"
        />

        <label for="email_from">Email expéditeur</label>
        <input
            type="email"
            id="email_from"
            name="email_from"
            value="{{ config.email_from }}"
            placeholder="brew-veille@example.com"
        />

        <label for="email_to">Email destinataire</label>
        <input
            type="email"
            id="email_to"
            name="email_to"
            value="{{ config.email_to }}"
            placeholder="vous@example.com"
        />

        <div class="form-actions">
            <button type="submit" class="btn">Enregistrer</button>
        </div>
    </form>
</div>
{% endblock %}
